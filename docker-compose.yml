# ── Local development stack ────────────────────────────────────────────────────
# Usage: make dev
#
# Services:
#   web      — Next.js dev server (hot reload)
#   db       — PostgreSQL 16
#   storage  — MinIO (S3-compatible object storage)

services:
  web:
    build:
      context: .
      target: deps        # mount source for hot reload
    command: sh -c "npx prisma generate && npx prisma migrate deploy && npm run dev"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    ports:
      - '3000:3000'
    env_file: .env
    environment:
      DATABASE_URL: postgresql://travelbuddy:travelbuddy@db:5432/travelbuddy
      S3_ENDPOINT: http://storage:9000
      S3_BUCKET: travelbuddy
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_REGION: us-east-1
    depends_on:
      db:
        condition: service_healthy
      storage:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: travelbuddy
      POSTGRES_PASSWORD: travelbuddy
      POSTGRES_DB: travelbuddy
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'       # expose for local tooling (Prisma Studio, etc.)
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U travelbuddy']
      interval: 5s
      timeout: 5s
      retries: 10

  storage:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - '9000:9000'       # S3 API
      - '9001:9001'       # MinIO console (http://localhost:9001)
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  minio_data:
